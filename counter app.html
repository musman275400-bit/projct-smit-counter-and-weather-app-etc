<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cou{
            background-color: rgb(204, 161, 20);
            color: aliceblue;
            text-align: center;
            padding: 200px;
           height: 1000px;

        }
        .bt{
              background-color: rgb(59, 123, 179);
              width: 200px;
              padding: 20px;
              border-radius: 10px;

        }
       .inc {
            width: 50px;
        }
    </style>
</head>
<body>
    <div class="cou">
    <center>
    <div class="bt"> 
        <h1>Counter App</h1>
         <button onclick="rest()">0</button>
          <button class="inc" onclick="inc ()">+</button>
        <button onclick="decrement()">-</button>
       
        </center>
       </div>
       
    <script>
        let Counter=0
        function inc(){
            Counter++
            console.log(Counter)
            document.querySelector("h1").textContent=Counter
        }
        function rest(){
            Counter=0
            document.querySelector("h1").textContent=Counter
        }
        function decrement(){
            Counter--
            console.log(Counter)
            document.querySelector("h1").textContent=Counter
        }
    </script>
</body>
</html>
